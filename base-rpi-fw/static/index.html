<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Garden E-Cutters Dashboard</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Leaflet (CDN for browser testing) -->
  <link rel="stylesheet" href="leaflet.css" />
</head>
<body>
  <!-- Top bar -->
  <header id="top-bar">
    <h1>GARDEN E-CUTTERS</h1>
    <div id="status-bar">
      <span id="connection-status-dot"></span>
      <span id="connection-status-text">Disconnected from Shears</span>
      <span id="total-cuts-label">Total Cuts:</span>
      <span id="total-cuts-value">0</span>
    </div>
  </header>

  <!-- Tabs -->
  <nav id="tabs">
    <button class="tab-button active" data-tab="log-tab">Logs</button>
    <button class="tab-button" data-tab="map-tab">Map</button>
    <button class="tab-button" data-tab="deleted-tab">Deleted</button>
  </nav>

  <!-- Tab content containers -->
  <main>
    <section id="log-tab" class="tab-content active">
      <!-- Filters -->
      <div id="log-filters">
        <button id="filter-button">Filter</button>
        <button id="delete-selected-button">Delete Selected</button>
        <button id="export-csv-button">Export CSV</button>
        <button id="export-selected-csv-button">Export Selected CSV</button>

        <label>
          Timestamp Range:
          <input type="date" id="timestamp-start" />
          <input type="date" id="timestamp-end" />
        </label>
      </div>

      <!-- Add Cut panel -->
      <section id="add-cut-panel">
        <h2>Add Cut (Manual)</h2>
        <div class="add-cut-row">
          <label>
            Date (MM/DD/YYYY)
            <input type="text" id="add-cut-date" placeholder="mm/dd/yyyy" />
          </label>
          <label>
            Lat
            <input type="number" id="add-cut-lat" step="0.000001" />
          </label>
          <label>
            Lon
            <input type="number" id="add-cut-lon" step="0.000001" />
          </label>
          <label>
            Fix Type
            <input type="number" id="add-cut-fix-quality" step="1" min="0" max="6" placeholder="0-6" />
          </label>
          <label>
            HDOP (Telemetry)
            <input type="number" id="add-cut-hdop" step="0.01" placeholder="optional" />
          </label>
          <label>
            UTC Time (HHMMSS)
            <input type="text" id="add-cut-utc" placeholder="0 = default" />
          </label>
          <button id="add-cut-button">Add Cut</button>
        </div>
        <p id="add-cut-message" aria-live="polite"></p>
      </section>

      <!-- Log table -->
      <table id="cut-log-table">
        <thead>
          <tr>
            <th><input type="checkbox" id="cut-select-all-checkbox" aria-label="Select all active cuts" /></th>
            <th>ID</th>
            <th>Date</th>
            <th>UTC Time</th>
            <th>Latitude</th>
            <th>Longitude</th>
            <th>Altitude</th>
            <th>Fix Quality</th>
            <th>Geoid Height</th>
            <th>HDOP (Telemetry)</th>
            <th># Satellites</th>
          </tr>
        </thead>
        <tbody id="cut-log-body"></tbody>
      </table>
    </section>

    <section id="map-tab" class="tab-content">
      <div id="map-mode-toggle">
        <span id="map-mode-label">Map Mode:</span>
        <button id="map-mode-normal" class="map-mode-button map-mode-active">Normal</button>
        <button id="map-mode-fix" class="map-mode-button">Fix Type</button>
      </div>

      <!-- Leaflet needs a real element with a height -->
      <div id="leaflet-map"></div>
    </section>

    <section id="deleted-tab" class="tab-content">
      <div id="deleted-controls">
        <button id="recover-selected-button">Recover Selected</button>
        <span id="deleted-retention-note">Deleted cuts are kept for 48 hours.</span>
      </div>

      <table id="deleted-cut-log-table">
        <thead>
          <tr>
            <th><input type="checkbox" id="deleted-cut-select-all-checkbox" aria-label="Select all deleted cuts" /></th>
            <th>ID</th>
            <th>Date</th>
            <th>UTC Time</th>
            <th>Latitude</th>
            <th>Longitude</th>
            <th>Expires In</th>
          </tr>
        </thead>
        <tbody id="deleted-cut-log-body"></tbody>
      </table>
    </section>
  </main>

  <script src="leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
